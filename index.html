<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>はなの自己紹介</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(rgba(0,0,20,0.6), rgba(0,0,40,0.9)),
                  url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') no-repeat center/cover;
      margin: 0;
      padding: 0;
      color: #e0f7ff;
      overflow-x: hidden;
      font-size: 18px;
    }

    header {
      text-align: center;
      padding: 30px;
      color: #aeefff;
    }

    h1 {
      font-size: 2.8em;
      text-shadow: 0 0 15px rgba(0,200,255,0.8);
    }

    .container {
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 20px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }

    .name-large {
      font-size: 2.2em;
      font-weight: bold;
    }

    input {
      padding: 8px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.2);
      color: white;
    }

    /* 星いっぱい */
    .stars {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .stars::after {
      content: '';
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      box-shadow:
        20px 30px white, 50px 80px white, 100px 150px white,
        150px 200px white, 200px 80px white, 250px 120px white,
        300px 200px white, 350px 50px white, 400px 120px white,
        450px 180px white, 500px 250px white, 550px 100px white,
        600px 90px white, 650px 160px white, 700px 60px white;
      animation: twinkle 2s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.3; }
      to { opacity: 1; }
    }

    /* 月 */
    .moon {
      position: fixed;
      top: 60px;
      right: 80px;
      width: 80px;
      height: 80px;
      background: radial-gradient(circle at 30% 30%, #fff, #ccc);
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(255,255,255,0.8);
      animation: moonMove 20s linear infinite;
    }

    @keyframes moonMove {
      0% { transform: translateX(0); }
      50% { transform: translateX(-200px); }
      100% { transform: translateX(0); }
    }

    .fade-in {
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>
<body>

<div class="stars"></div>
<div class="moon"></div>

<header>
  <h1>🌙 はなの自己紹介 🌊</h1>
</header>

<div class="container">

  <div class="card">
    <h2>名前</h2>
    <p class="name-large">はな</p>
  </div>

  <div class="card">
    <h2>誕生日</h2>
    <input type="date" id="birthday" value="2009-07-17">
    <p id="age"></p>
    <p id="zodiac"></p>
  </div>

  <div class="card">
    <h2>好きなこと</h2>
    <p>サックスを吹くこと 🎷</p>
  </div>

  <div class="card">
    <h2>趣味</h2>
    <p>絵を描くこと 🎨</p>
  </div>

</div>

<script>
  const birthdayInput = document.getElementById('birthday');
  const ageText = document.getElementById('age');
  const zodiacText = document.getElementById('zodiac');

  function updateInfo() {
    const birthDate = new Date(birthdayInput.value);
    if (!birthdayInput.value) return;

    const today = new Date();

    let age = today.getFullYear() - birthDate.getFullYear();
    const m = today.getMonth() - birthDate.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
      age--;
    }

    ageText.textContent = `年齢：${age}歳`;

    const month = birthDate.getMonth() + 1;
    const day = birthDate.getDate();

    let zodiac = '';
    if ((month==3 && day>=21)||(month==4 && day<=19)) zodiac='おひつじ座';
    else if ((month==4 && day>=20)||(month==5 && day<=20)) zodiac='おうし座';
    else if ((month==5 && day>=21)||(month==6 && day<=21)) zodiac='ふたご座';
    else if ((month==6 && day>=22)||(month==7 && day<=22)) zodiac='かに座';
    else if ((month==7 && day>=23)||(month==8 && day<=22)) zodiac='しし座';
    else if ((month==8 && day>=23)||(month==9 && day<=22)) zodiac='おとめ座';
    else if ((month==9 && day>=23)||(month==10 && day<=23)) zodiac='てんびん座';
    else if ((month==10 && day>=24)||(month==11 && day<=22)) zodiac='さそり座';
    else if ((month==11 && day>=23)||(month==12 && day<=21)) zodiac='いて座';
    else if ((month==12 && day>=22)||(month==1 && day<=19)) zodiac='やぎ座';
    else if ((month==1 && day>=20)||(month==2 && day<=18)) zodiac='みずがめ座';
    else if ((month==2 && day>=19)||(month==3 && day<=20)) zodiac='うお座';

    zodiacText.textContent = `🌙 あなたの星座は… ${zodiac} ✨`;
    zodiacText.classList.add('fade-in');
  }

  birthdayInput.addEventListener('change', updateInfo);
  window.addEventListener('load', updateInfo);
</script>

</body>
</html>
